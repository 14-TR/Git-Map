[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gitmap-core"
version = "0.7.0"
description = "Core library for GitMap — version control for ArcGIS web maps"
readme = "README.md"
requires-python = ">=3.11,<3.15"
license = {text = "MIT"}
authors = [
    {name = "TR Ingram", email = "tr@ingramgeoai.com"}
]
keywords = ["arcgis", "gis", "version-control", "web-maps", "esri", "git"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: GIS",
    "Topic :: Software Development :: Version Control",
    "Typing :: Typed",
]
dependencies = [
    "arcgis>=2.2.0,<3.0.0",
    "deepdiff>=6.0.0",
]

[project.urls]
Homepage = "https://github.com/14-TR/Git-Map"
Repository = "https://github.com/14-TR/Git-Map"
"Bug Tracker" = "https://github.com/14-TR/Git-Map/issues"
Changelog = "https://github.com/14-TR/Git-Map/blob/main/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "rich>=13.0.0",
]

[tool.setuptools]
packages = ["gitmap_core"]

[tool.setuptools.package-dir]
gitmap_core = "."

[tool.setuptools.package-data]
gitmap_core = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
pythonpath = ["packages"]
