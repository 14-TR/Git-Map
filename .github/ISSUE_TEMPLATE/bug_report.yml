name: Bug Report
description: Something is broken or not working as expected
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out as much detail as you can.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Git-Map is affected?
      options:
        - CLI (`gitmap` command)
        - Core library (`gitmap_core`)
        - MCP Server
        - ArcGIS Pro Toolbox
        - Documentation
        - CI/Build
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: "When I run `gitmap diff`, it crashes with..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `gitmap init`
        2. Run `gitmap diff`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include full error output / traceback if available.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: portal
    attributes:
      label: Portal Type
      options:
        - ArcGIS Online
        - Portal for ArcGIS (Enterprise)
        - Not applicable (no Portal involved)
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "e.g. 3.12.2"
    validations:
      required: true

  - type: input
    id: gitmap-version
    attributes:
      label: Git-Map Version
      placeholder: "e.g. 0.6.0  (run: gitmap --version)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Anything else that might be relevant (config, environment, related issues).
