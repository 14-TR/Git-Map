name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea for Git-Map? Describe it below. The more context you give, the easier it is to prioritize.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow pain point or gap this feature would address.
      placeholder: "Right now I have to manually... which is tedious because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like to see this work? Include example commands or output if possible.
      placeholder: |
        A new `gitmap export` command that...

        ```
        gitmap export --format csv > changes.csv
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds you're currently using, or other approaches you've thought about.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (`gitmap` command)
        - Core library (`gitmap_core`)
        - MCP Server
        - ArcGIS Pro Toolbox
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to your workflow?
      options:
        - Nice to have
        - Would use regularly
        - Blocking my use of Git-Map
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Links, screenshots, related issues, or anything else useful.
