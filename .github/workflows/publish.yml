name: Publish to PyPI

on:
  push:
    tags:
      - "core-v*"   # e.g. core-v0.6.0 → publishes gitmap-core

permissions:
  contents: read
  id-token: write   # Required for PyPI trusted publishing (OIDC)

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Run tests before publishing
        run: |
          pip install -e "packages/gitmap_core[dev]"
          python -m pytest packages/gitmap_core/tests -x -q

      - name: Build gitmap-core wheel and sdist
        run: python -m build packages/gitmap_core --outdir dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gitmap-core

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
