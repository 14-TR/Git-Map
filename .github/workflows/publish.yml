name: Publish to PyPI

on:
  push:
    tags:
      - "core-v*"   # e.g. core-v0.6.0 → publishes gitmap-core
      - "v*"        # e.g. v0.6.0 → publishes gitmap (CLI)

permissions:
  contents: read
  id-token: write   # Required for PyPI trusted publishing (OIDC)

jobs:
  build-core:
    name: Build gitmap-core
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/core-v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Run tests before publishing
        run: |
          pip install -e "packages/gitmap_core[dev]"
          python -m pytest packages/gitmap_core/tests -x -q

      - name: Build gitmap-core wheel and sdist
        run: python -m build packages/gitmap_core --outdir dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-core
          path: dist/

  publish-core:
    name: Publish gitmap-core to PyPI
    needs: build-core
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gitmap-core

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-core
          path: dist/

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1

  build-cli:
    name: Build gitmap (CLI)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/v0.0')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Run core tests before publishing
        run: |
          pip install -e "packages/gitmap_core[dev]"
          python -m pytest packages/gitmap_core/tests -x -q

      - name: Build gitmap CLI wheel and sdist
        run: python -m build apps/cli/gitmap --outdir dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-cli
          path: dist/

  publish-cli:
    name: Publish gitmap (CLI) to PyPI
    needs: build-cli
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gitmap

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-cli
          path: dist/

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
