name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.9.0"

      - name: Lint — check for errors
        run: |
          ruff check packages/gitmap_core/ apps/cli/gitmap/ \
            --select E,F,B,W \
            --ignore E501,E741,F841,W293 \
            --output-format github

      - name: Format — check style
        run: ruff format --check packages/gitmap_core/ apps/cli/gitmap/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/gitmap_core[dev]"
          pip install click rich apscheduler

      - name: Run tests
        run: |
          python -m pytest packages/gitmap_core/tests -v --tb=short

      - name: Run tests with coverage
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest packages/gitmap_core/tests --cov=packages/gitmap_core --cov-report=term-missing --cov-fail-under=90

  package-validation:
    name: Package validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify release metadata invariants
        run: python scripts/release_checks.py

      - name: Build distributable artifacts
        run: |
          python -m build packages/gitmap_core --outdir dist/core
          python -m build apps/cli/gitmap --outdir dist/cli
          python -m build . --outdir dist/meta

      - name: Check rendered package metadata
        run: python -m twine check dist/core/* dist/cli/* dist/meta/*
